services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${REIMBURSD_POSTGRES_DATABASE:-reimbursd}
      POSTGRES_PASSWORD: ${REIMBURSD_POSTGRES_PASSWORD:?Set REIMBURSD_POSTGRES_PASSWORD in .env}
      POSTGRES_USER: ${REIMBURSD_POSTGRES_USER:-reimbursd}
    ports:
      - '127.0.0.1:${REIMBURSD_POSTGRES_PORT:-5432}:5432'
    volumes:
      - reimbursd-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: ['server', '/data', '--address', ':9000', '--console-address', ':9001']
    environment:
      MINIO_ROOT_PASSWORD: ${REIMBURSD_MINIO_ROOT_PASSWORD:?Set REIMBURSD_MINIO_ROOT_PASSWORD in .env}
      MINIO_ROOT_USER: ${REIMBURSD_MINIO_ROOT_USER:?Set REIMBURSD_MINIO_ROOT_USER in .env}
    ports:
      - '127.0.0.1:${REIMBURSD_MINIO_PORT:-9000}:9000'
    volumes:
      - reimbursd-minio-data:/data
    healthcheck:
      test: ['CMD', 'curl', '--fail', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    restart: 'no'
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_PASSWORD: ${REIMBURSD_MINIO_ROOT_PASSWORD:?Set REIMBURSD_MINIO_ROOT_PASSWORD in .env}
      MINIO_ROOT_USER: ${REIMBURSD_MINIO_ROOT_USER:?Set REIMBURSD_MINIO_ROOT_USER in .env}
      REIMBURSD_OBJECT_BUCKET: ${REIMBURSD_OBJECT_BUCKET:-reimbursd-receipts}
    entrypoint:
      - /bin/sh
      - -eu
      - -c
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing "local/$${REIMBURSD_OBJECT_BUCKET}"
        mc anonymous set none "local/$${REIMBURSD_OBJECT_BUCKET}"

volumes:
  reimbursd-minio-data:
  reimbursd-postgres-data:
