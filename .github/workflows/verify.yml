# SPDX-License-Identifier: GPL-3.0-only
name: Verify

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Repository quality gate
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: '22.x'

      - name: Install locked dependencies
        run: npm ci

      - name: Run practical quality gate
        run: npm run verify
